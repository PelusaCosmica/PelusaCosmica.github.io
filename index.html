<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Canal U | Pelusa Cosmica</title>
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #2d1b4e 0%, #4a148c 50%, #9c27b0 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 50px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .logo-img {
      height: 50px;
      width: auto;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .video-container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
    }

    /* --- Estilos para el nuevo botón de recarga --- */
    .btn-reload {
      margin-top: 25px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-reload:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(156, 39, 176, 0.4);
    }

    .btn-reload:active {
      transform: translateY(0);
    }

    .footer-info {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <header>
    <img src="Logo Canal U.png" alt="Logo Canal U" class="logo-img">
    <span class="brand-name">Canal U</span>
  </header>

  <main>
    <div class="video-container">
      <iframe allowfullscreen="true" scrolling="no" src="https://esvidzypro.sbs/dsportsco.php" allow="encrypted-media" width="100%" height="100%" frameborder="0" id="embedIframe"></iframe>
    </div>

    <button class="btn-reload" onclick="reiniciarTransmision()">
      🔄 Actualizar Señal
    </button>
  </main>

  <footer class="footer-info">
    &copy; 2026 PelusaCosmica | Transmisión Segura
  </footer>

  <script type="text/javascript">
    function reiniciarTransmision() {
      window.location.reload();
    }
  </script>

</body>
</html>
