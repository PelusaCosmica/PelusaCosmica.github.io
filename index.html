<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Canal U | Pelusa Cosmica</title>
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #2d1b4e 0%, #4a148c 50%, #9c27b0 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 50px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .logo-img {
      height: 50px;
      width: auto;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .video-container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
    }

    /* Estilos para el botón de recarga integrado del segundo código */
    .centerfull {
      position: absolute;
      bottom: 15px;
      right: 15px;
      z-index: 10;
    }

    #btnIframe {
      background: rgba(156, 39, 176, 0.8);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(5px);
      transition: background 0.3s ease;
    }

    #btnIframe:hover {
      background: rgba(156, 39, 176, 1);
    }

    .footer-info {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <header>
    <img src="Logo Canal U.png" alt="Logo Canal U" class="logo-img">
    <span class="brand-name">Canal U</span>
  </header>

  <main>
    <div class="video-container">
      <iframe 
        id="embedIframe"
        allowfullscreen="true" 
        scrolling="no" 
        src="https://la18hd.com/vivo/canal.php?stream=dsports" 
        allow="encrypted-media" 
        frameborder="0"
        sandbox="allow-scripts allow-same-origin allow-forms">
      </iframe>

      <div class="centerfull">
        <button id="btnIframe" onclick="document.getElementById('embedIframe').src += ''">
          Recargar Página
        </button>
      </div>
    </div>
  </main>

  <footer class="footer-info">
    &copy; 2026 PelusaCosmica | Transmisión Segura
  </footer>

</body>
</html>
